# Starter pipeline
# Start with a minimal pipeline that you can customize to build and deploy your code.
# Add steps that build, run tests, deploy, and more:
# https://aka.ms/yaml

trigger:
- main

pool:
  vmImage: ubuntu-latest

variables:
- group: my_subscription

stages:
- stage: validation
  displayName: "Terraform Validations"

  jobs:
  - job: terraform
    displayName: "Terraform Plan"

    steps:

    # Checkout source code
    - checkout: self

    # Install Terraform
    - task: TerraformInstaller@1
      inputs:
        terraformVersion: "latest"

    # Debug (Temporary - Remove later)
    - script: |
        echo "Current Directory:"
        pwd

        echo ""
        echo "Build Sources Directory:"
        echo $(Build.SourcesDirectory)

        echo ""
        echo "Repository Structure:"
        find $(Build.SourcesDirectory) -maxdepth 3 -type f
      displayName: "Debug Repository"

    - script: terraform init
      displayName: "Terraform Init"
      workingDirectory: $(Build.SourcesDirectory)/eviorment/development

    - script: terraform plan
      displayName: "Terraform Plan"
      workingDirectory: $(Build.SourcesDirectory)/eviorment/development
      env:
        TF_VAR_subscription_id: $(subscription_id)

            
        